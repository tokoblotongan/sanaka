<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monkey Legend — Petualangan Sun Wukong</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--red:#FF4444;--orange:#FF8C00;--cyan:#00E5FF;--dark:#1a0a1e}
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Nunito',sans-serif;user-select:none}
canvas{display:block}
#ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.panel{background:rgba(20,5,30,0.8);backdrop-filter:blur(8px);border:1px solid rgba(255,215,0,0.25);border-radius:12px;padding:8px 14px;color:#fff;min-width:120px}
.panel h3{font-family:'Fredoka One',cursive;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:4px}
.bar-w{height:8px;background:rgba(0,0,0,0.5);border-radius:6px;overflow:hidden}
.bar-f{height:100%;border-radius:6px;transition:width 0.15s}
.hp-f{background:linear-gradient(90deg,#FF4444,#FF6B6B)}
.en-f{background:linear-gradient(90deg,var(--cyan),#00B8D4)}
.val{font-size:20px;font-weight:900;font-family:'Fredoka One',cursive}
.val.g{color:var(--gold)}
.val.c{color:var(--cyan)}
#overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(50,20,10,0.95),rgba(10,0,5,0.98));transition:opacity 0.5s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-family:'Fredoka One',cursive;font-size:clamp(32px,7vw,72px);background:linear-gradient(135deg,var(--gold),var(--orange),#FF6B6B,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;line-height:1.1;margin-bottom:6px}
#overlay .sub{color:rgba(255,255,255,0.55);font-size:14px;margin-bottom:30px;text-align:center;max-width:380px;line-height:1.5}
.btn{pointer-events:all;font-family:'Fredoka One',cursive;font-size:18px;padding:12px 44px;border:none;border-radius:50px;cursor:pointer;color:#1a0a1e;background:linear-gradient(135deg,var(--gold),var(--orange));box-shadow:0 4px 25px rgba(255,140,0,0.4);transition:transform 0.2s}
.btn:hover{transform:scale(1.07)}
.btn:active{transform:scale(0.96)}
.ctrls{margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.ctrl{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:rgba(255,255,255,0.6);font-size:12px}
.ctrl kbd{background:rgba(255,255,255,0.12);border-radius:4px;padding:1px 6px;font-family:'Fredoka One',cursive;color:#fff;font-size:11px}
#gameover{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,0,0,0.92)}
#gameover.show{display:flex}
#gameover h1{font-family:'Fredoka One',cursive;font-size:52px;color:#FF4444;margin-bottom:8px}
#gameover .st{color:rgba(255,255,255,0.65);font-size:16px;margin-bottom:24px;text-align:center;line-height:2}
#gameover .st span{color:var(--gold);font-weight:900;font-size:20px}
.qf{position:fixed;inset:0;pointer-events:none;z-index:5;background:rgba(255,50,50,0);transition:background 0.08s}
.qf.on{background:rgba(255,50,50,0.06)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="qf" id="qf"></div>
<div id="ui">
  <div class="panel"><h3>Nyawa</h3><div class="bar-w"><div class="bar-f hp-f" id="hpB" style="width:100%"></div></div></div>
  <div class="panel" style="text-align:center"><h3>Skor</h3><div class="val g" id="scV">0</div></div>
  <div class="panel" style="text-align:center"><h3>Jarak</h3><div class="val c" id="dsV">0m</div></div>
  <div class="panel"><h3>Energi</h3><div class="bar-w"><div class="bar-f en-f" id="enB" style="width:100%"></div></div></div>
</div>
<div id="overlay">
  <h1>Monkey Legend</h1>
  <p class="sub">Jelajahi dunia persis seperti Mario, dengan kekuatan Sun Wukong — Kamehameha, Awan Kinton, dan hadapi gempa bumi serta hantu pengejar!</p>
  <button class="btn" id="startBtn">Mulai Petualangan</button>
  <div class="ctrls">
    <div class="ctrl"><kbd>A</kbd><kbd>D</kbd> Gerak</div>
    <div class="ctrl"><kbd>W</kbd> Lompat</div>
    <div class="ctrl"><kbd>J</kbd> Serang</div>
    <div class="ctrl"><kbd>K</kbd> Kamehameha</div>
    <div class="ctrl"><kbd>L</kbd> Awan Kinton</div>
    <div class="ctrl"><kbd>S</kbd> Turun Platform</div>
  </div>
</div>
<div id="gameover">
  <h1>Tumbang!</h1>
  <div class="st" id="goSt"></div>
  <button class="btn" id="restartBtn">Coba Lagi</button>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',resize);

/* ========== AUDIO ========== */
let ac;
function initAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)()}
function tone(f,d,t='sine',v=0.12,fe=null){
  if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();
  o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);
  if(fe)o.frequency.exponentialRampToValueAtTime(Math.max(20,fe),ac.currentTime+d);
  g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);
}
function sfxJump(){tone(300,0.15,'sine',0.1,600)}
function sfxAtk(){tone(500,0.08,'sawtooth',0.08,250)}
function sfxKame(){tone(150,0.8,'sawtooth',0.15,800);setTimeout(()=>tone(400,0.4,'sine',0.1,100),200)}
function sfxHit(){tone(180,0.12,'square',0.1,60)}
function sfxQuake(){tone(35,1.5,'sawtooth',0.18,15)}
function sfxCoin(){tone(800,0.1,'sine',0.08);setTimeout(()=>tone(1200,0.15,'sine',0.08),80)}
function sfxCloud(){tone(600,0.3,'sine',0.1,900)}
function sfxGhost(){tone(80,0.5,'sine',0.06,40)}

/* ========== UTILITAS ========== */
function rnd(a,b){return Math.random()*(b-a)+a}
function rndI(a,b){return Math.floor(rnd(a,b+1))}
function pick(a){return a[Math.floor(Math.random()*a.length)]}

/* ========== STATE ========== */
let state='menu',score=0,distance=0,frame=0;
let player,platforms,ghosts,coins,particles,projectiles,kameBlasts;
let keys={},shake={x:0,y:0,i:0,t:0},quakeCD=0;
let cam={x:0,y:0},genX=0;
let cloudTimer=0;

addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;e.preventDefault()});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});

/* ========== KONSTANTA ========== */
const GRAV=0.55,JUMP=-12,SPEED=4.5,MAX_FALL=14;
const PW=32,PH=40; // ukuran pemain
const PLAT_H=18;

/* ========== PLATFORM ========== */
function makePlat(x,y,w,type='candy'){
  return{x,y,w,h:PLAT_H,type,coins:[],decor:rnd(0,1)<0.3?'flower':null};
}

function generateChunk(startX){
  let px=startX;
  // Pastikan ada platform dasar
  platforms.push(makePlat(px,H-40,W*0.8,'ground'));
  px+=W*0.7;
  
  for(let i=0;i<rndI(4,7);i++){
    let gap=rnd(60,140);
    px+=gap;
    let w=rnd(80,220);
    let y=rnd(H*0.3,H-100);
    let t=pick(['candy','candy','candy','chocolate','ice']);
    let p=makePlat(px,y,w,t);
    // Koin di atas platform
    let nc=rndI(1,Math.floor(w/40));
    for(let c=0;c<nc;c++){
      p.coins.push({x:p.x+20+c*35,y:p.y-30,collected:false,bob:rnd(0,6.28)});
    }
    platforms.push(p);
    px+=w;
  }
  genX=px;
}

/* ========== GHOST (HANTU PENGEJAR) ========== */
function spawnGhost(){
  let side=Math.random()<0.5?-1:1;
  let gx=cam.x+(side<0?-60:W+60);
  let gy=rnd(H*0.2,H*0.6);
  ghosts.push({
    x:gx,y:gy,
    vx:0,vy:0,
    size:rnd(28,42),
    speed:rnd(1.2,2.5)+distance*0.0003,
    hp:2+Math.floor(distance/500),
    maxHp:2+Math.floor(distance/500),
    phase:rnd(0,6.28),
    hitFlash:0,
    type:rndI(0,2) // 0=bayangan,1=spectral,2=skull
  });
  sfxGhost();
}

function updateGhost(g){
  // Kejar pemain
  let dx=player.x-g.x,dy=player.y-g.y;
  let d=Math.hypot(dx,dy)||1;
  let ax=(dx/d)*g.speed*0.08;
  let ay=(dy/d)*g.speed*0.08;
  // Gravitasi ringan
  ay+=0.03;
  g.vx=(g.vx+ax)*0.98;
  g.vy=(g.vy+ay)*0.98;
  g.vy=Math.max(-6,Math.min(6,g.vy));
  g.x+=g.vx;g.y+=g.vy;
  g.phase+=0.06;
  if(g.hitFlash>0)g.hitFlash--;
  
  // Tumbukan dengan pemain
  if(Math.abs(g.x-player.x)<g.size+PW/2 && Math.abs(g.y-player.y)<g.size+PH/2){
    if(player.inv<=0){
      player.hp-=15;
      player.inv=50;
      sfxHit();
      triggerShake(10,18);
      spawnP(player.x,player.y,8,'#FF4444',1.2);
    }
  }
}

function drawGhost(g){
  X.save();
  X.translate(g.x-cam.x,g.y-cam.y);
  let s=g.size;
  let p=Math.sin(g.phase)*0.08+1;
  let gx=g.x,gx0=player.x;
  let faceR=gx<gx0?1:-1;
  X.scale(faceR*p,p);
  
  // Aura gelap
  let ag=X.createRadialGradient(0,0,s*0.3,0,0,s*2);
  ag.addColorStop(0,'rgba(100,0,150,0.2)');
  ag.addColorStop(1,'rgba(0,0,0,0)');
  X.beginPath();X.arc(0,0,s*2,0,6.28);X.fillStyle=ag;X.fill();
  
  if(g.type===0){
    // Hantu bayangan — transparan gelap dengan mata putih
    X.beginPath();
    X.moveTo(-s,0);
    X.quadraticCurveTo(-s,-s*1.2,0,-s*1.3);
    X.quadraticCurveTo(s,-s*1.2,s,0);
    // Bawah bergelombang
    for(let i=0;i<5;i++){
      let bx=s-i*(s*2/5);
      X.quadraticCurveTo(bx-s*0.1,s*0.5+(i%2?-8:8),bx-s*0.2,0);
    }
    X.closePath();
    let bg=X.createLinearGradient(0,-s,0,s*0.5);
    bg.addColorStop(0,'rgba(40,0,60,0.7)');
    bg.addColorStop(1,'rgba(20,0,40,0.4)');
    X.fillStyle=bg;X.fill();
    // Mata
    X.beginPath();X.ellipse(-s*0.3,-s*0.4,s*0.22,s*0.3,0,0,6.28);X.fillStyle='#FFF';X.fill();
    X.beginPath();X.ellipse(s*0.3,-s*0.4,s*0.22,s*0.3,0,0,6.28);X.fill();
    X.beginPath();X.arc(-s*0.25,-s*0.35,s*0.1,0,6.28);X.fillStyle='#000';X.fill();
    X.beginPath();X.arc(s*0.25,-s*0.35,s*0.1,0,6.28);X.fill();
    // Mulut
    X.beginPath();X.ellipse(0,-s*0.05,s*0.15,s*0.1,0,0,6.28);X.fillStyle='rgba(0,0,0,0.5)';X.fill();
  }else if(g.type===1){
    // Hantu spectral — tubuh cahaya ungu
    X.beginPath();
    X.moveTo(-s*0.8,s*0.6);
    X.quadraticCurveTo(-s*0.9,-s*0.5,0,-s*1.1);
    X.quadraticCurveTo(s*0.9,-s*0.5,s*0.8,s*0.6);
    for(let i=0;i<4;i++){
      let bx=s*0.8-i*(s*1.6/4);
      X.quadraticCurveTo(bx-s*0.1,s*0.9+(i%2?-6:6),bx-s*0.2,s*0.6);
    }
    X.closePath();
    let sg=X.createRadialGradient(0,-s*0.3,s*0.1,0,0,s*1.2);
    sg.addColorStop(0,'rgba(180,80,255,0.6)');
    sg.addColorStop(0.5,'rgba(120,0,200,0.35)');
    sg.addColorStop(1,'rgba(60,0,100,0.1)');
    X.fillStyle=sg;X.fill();
    // Mata satu besar
    X.beginPath();X.arc(0,-s*0.3,s*0.3,0,6.28);X.fillStyle='#E0B0FF';X.fill();
    X.beginPath();X.arc(s*0.05,-s*0.25,s*0.15,0,6.28);X.fillStyle='#4A0080';X.fill();
    X.beginPath();X.arc(s*0.08,-s*0.28,s*0.05,0,6.28);X.fillStyle='#FFF';X.fill();
  }else{
    // Hantu tengkorak
    X.beginPath();X.arc(0,-s*0.3,s*0.8,0,6.28);
    let skg=X.createRadialGradient(-s*0.2,-s*0.5,s*0.1,0,-s*0.3,s*0.8);
    skg.addColorStop(0,'#E8E0D0');
    skg.addColorStop(0.7,'#B0A090');
    skg.addColorStop(1,'#706050');
    X.fillStyle=skg;X.fill();
    // Rahang
    X.beginPath();X.ellipse(0,s*0.25,s*0.5,s*0.3,0,0,Math.PI);
    X.fillStyle='#A09080';X.fill();
    // Mata kosong
    X.beginPath();X.ellipse(-s*0.25,-s*0.35,s*0.2,s*0.25,0,0,6.28);X.fillStyle='#000';X.fill();
    X.beginPath();X.ellipse(s*0.25,-s*0.35,s*0.2,s*0.25,0,0,6.28);X.fill();
    // Cahaya mata merah
    X.beginPath();X.arc(-s*0.25,-s*0.35,s*0.06,0,6.28);X.fillStyle='#FF0000';X.fill();
    X.beginPath();X.arc(s*0.25,-s*0.35,s*0.06,0,6.28);X.fill();
    // Hidung
    X.beginPath();X.moveTo(-s*0.05,-s*0.1);X.lineTo(s*0.05,-s*0.1);X.lineTo(0,-s*0.2);X.closePath();X.fillStyle='#000';X.fill();
    // Gigi
    for(let i=-2;i<=2;i++){
      X.fillRect(i*s*0.12-2,s*0.1,4,s*0.12);
    }
  }
  
  // Hit flash
  if(g.hitFlash>0){
    X.globalAlpha=g.hitFlash/8*0.5;
    X.beginPath();X.arc(0,0,s*1.2,0,6.28);X.fillStyle='#FFF';X.fill();
    X.globalAlpha=1;
  }
  
  // HP bar
  if(g.hp<g.maxHp){
    X.scale(faceR,1); // balikkan scale untuk bar
    let bw=s*1.5,bh=4;
    X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(-bw/2,-s*1.6,bw,bh);
    X.fillStyle='#B040FF';X.fillRect(-bw/2,-s*1.6,bw*(g.hp/g.maxHp),bh);
  }
  
  X.restore();
}

/* ========== KAMEHAMEHA ========== */
function fireKame(){
  if(player.energy<40)return;
  player.energy-=40;
  player.kameCharge=0;
  let dir=player.facing;
  kameBlasts.push({
    x:player.x+dir*PW/2,
    y:player.y-PH*0.1,
    vx:dir*10,
    size:20,
    maxLife:80,
    life:80,
    damage:3
  });
  sfxKame();
  triggerShake(6,12);
  spawnP(player.x+dir*20,player.y-PH*0.1,15,'#00E5FF',1.5,1.2);
}

function updateKame(k){
  k.x+=k.vx;k.life--;
  k.size=Math.min(35,k.size+0.3);
  // Tumbukan dengan hantu
  ghosts.forEach(g=>{
    if(Math.hypot(k.x-g.x,k.y-g.y)<k.size+g.size){
      g.hp-=k.damage;g.hitFlash=8;
      spawnP(g.x,g.y,6,'#00E5FF',1);
      sfxHit();
    }
  });
}

function drawKame(k){
  let sx=k.x-cam.x,sy=k.y-cam.y;
  let a=k.life/k.maxLife;
  // Sinar utama
  let lg=X.createRadialGradient(sx,sy,0,sx,sy,k.size*2);
  lg.addColorStop(0,`rgba(200,255,255,${a*0.9})`);
  lg.addColorStop(0.3,`rgba(0,229,255,${a*0.6})`);
  lg.addColorStop(0.7,`rgba(0,100,200,${a*0.3})`);
  lg.addColorStop(1,'rgba(0,50,150,0)');
  X.beginPath();X.arc(sx,sy,k.size*2,0,6.28);X.fillStyle=lg;X.fill();
  // Inti putih
  X.beginPath();X.arc(sx,sy,k.size*0.6,0,6.28);X.fillStyle=`rgba(255,255,255,${a*0.9})`;X.fill();
  // Ekor
  X.beginPath();
  X.moveTo(sx,sy-k.size*0.8);
  X.lineTo(sx-k.vx*3,sy-k.size*0.5);
  X.lineTo(sx-k.vx*3,sy+k.size*0.5);
  X.lineTo(sx,sy+k.size*0.8);
  X.closePath();
  X.fillStyle=`rgba(0,180,255,${a*0.3})`;X.fill();
}

/* ========== PROYEKTIIL TONGKAT ========== */
function fireStaff(){
  if(player.atkCD>0)return;
  player.atkCD=15;
  let dir=player.facing;
  projectiles.push({
    x:player.x+dir*PW,y:player.y-PH*0.2,
    vx:dir*8,life:40,size:6
  });
  sfxAtk();
  spawnP(player.x+dir*PW,player.y-PH*0.2,4,'#FFD700',0.8);
}

function drawProjectile(p){
  let sx=p.x-cam.x,sy=p.y-cam.y;
  X.save();X.translate(sx,sy);
  // Cahaya
  let g=X.createRadialGradient(0,0,0,0,0,p.size*2);
  g.addColorStop(0,'rgba(255,215,0,0.8)');
  g.addColorStop(0.5,'rgba(255,140,0,0.3)');
  g.addColorStop(1,'rgba(255,100,0,0)');
  X.beginPath();X.arc(0,0,p.size*2,0,6.28);X.fillStyle=g;X.fill();
  // Bintang inti
  drawStar(X,0,0,5,p.size,p.size*0.4,'#FFD700');
  X.restore();
}

/* ========== AWAN KINTON ========== */
function activateCloud(){
  if(player.energy<20||player.onCloud)return;
  player.energy-=20;
  player.onCloud=true;
  player.cloudTimer=240;
  player.vy=0;
  sfxCloud();
  spawnP(player.x,player.y+PH/2,12,'#FFF8DC',1,0.8);
}

/* ========== PARTIKEL ========== */
function spawnP(x,y,n,col,sm=1,szm=1){
  for(let i=0;i<n;i++){
    let a=rnd(0,6.28),sp=rnd(1,5)*sm;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-rnd(0,2),life:rnd(15,40),ml:40,size:rnd(2,6)*szm,color:col});
  }
}

/* ========== GEMPA ========== */
function triggerShake(i,t){shake.i=Math.max(shake.i,i);shake.t=Math.max(shake.t,t)}
function triggerQuake(){
  triggerShake(20,100);sfxQuake();
  document.getElementById('qf').classList.add('on');
  setTimeout(()=>document.getElementById('qf').classList.remove('on'),600);
  // Partikel debu dari semua platform
  platforms.forEach(p=>{
    if(p.x+p.w>cam.x-50&&p.x<cam.x+W+50){
      for(let i=0;i<5;i++){
        particles.push({x:p.x+rnd(0,p.w),y:p.y,vx:rnd(-3,3),vy:rnd(-4,-1),life:rnd(20,50),ml:50,size:rnd(3,8),color:pick(['#8B7355','#A0926B','#6B5B3A'])});
      }
    }
  });
  // Damage hantu
  ghosts.forEach(g=>{g.hp-=1;g.hitFlash=5});
  // Pemain terganggu sedikit
  if(player.onGround)player.vy=-5;
}

/* ========== PEMAIN ========== */
function createPlayer(){
  return{x:200,y:H-200,vx:0,vy:0,hp:100,maxHp:100,energy:100,maxEnergy:100,
    facing:1,onGround:false,onCloud:false,cloudTimer:0,
    inv:0,atkCD:0,kameCharge:0,jumps:2};
}

function updatePlayer(){
  let p=player;
  // Gerak horizontal
  if(keys['a']||keys['arrowleft']){p.vx=-SPEED;p.facing=-1}
  else if(keys['d']||keys['arrowright']){p.vx=SPEED;p.facing=1}
  else p.vx*=0.8;
  
  // Lompat
  if((keys['w']||keys['arrowup'])&&!p._jumpHeld){
    if(p.onCloud){
      p.onCloud=false;p.cloudTimer=0;
      p.vy=JUMP*0.8;p.jumps=1;
    }else if(p.jumps>0){
      p.vy=JUMP;p.jumps--;p.onGround=false;sfxJump();
      spawnP(p.x,p.y+PH/2,5,'#FFD700',0.5,0.5);
    }
    p._jumpHeld=true;
  }
  if(!keys['w']&&!keys['arrowup'])p._jumpHeld=false;
  
  // Turun dari platform
  if(keys['s']||keys['arrowdown']){
    p.dropThrough=8;
  }
  
  // Awan Kinton
  if(keys['l']&&!p._cloudHeld){activateCloud();p._cloudHeld=true}
  if(!keys['l'])p._cloudHeld=false;
  
  // Serang tongkat
  if(keys['j'])fireStaff();
  
  // Kamehameha charge & fire
  if(keys['k']){p.kameCharge=Math.min(60,p.kameCharge+1)}
  else if(p.kameCharge>10){fireKame()}
  else{p.kameCharge=0}
  
  // Fisika
  if(p.onCloud){
    p.vy=0;
    // Terbang mengikuti input
    if(keys['w']||keys['arrowup'])p.vy=-3;
    if(keys['s']||keys['arrowdown'])p.vy=3;
    p.cloudTimer--;
    if(p.cloudTimer<=0||p.energy<=0){p.onCloud=false}
    // Partikel awan
    if(frame%3===0)particles.push({x:p.x+rnd(-15,15),y:p.y+PH/2+rnd(0,10),vx:rnd(-0.5,0.5),vy:rnd(0.5,2),life:rnd(15,25),ml:25,size:rnd(3,8),color:'rgba(255,255,255,0.4)'});
  }else{
    p.vy+=GRAV;
    if(p.vy>MAX_FALL)p.vy=MAX_FALL;
  }
  
  p.x+=p.vx;p.y+=p.vy;
  
  if(p.dropThrough>0)p.dropThrough--;
  
  // Platform collision
  p.onGround=false;
  platforms.forEach(pl=>{
    if(p.dropThrough>0&&pl.type!=='ground')return;
    let px=p.x-PW/2,py=p.y-PH/2;
    // Cek dari atas
    if(p.vx!==0||p.vy>=0){
      if(px+PW>pl.x&&px<pl.x+pl.w){
        let prevBottom=py+PH-p.vy;
        if(prevBottom<=pl.y+4&&py+PH>=pl.y&&py+PH<=pl.y+pl.h+8){
          p.y=pl.y-PH/2;p.vy=0;p.onGround=true;p.jumps=2;
        }
      }
    }
  });
  
  // Jatuh ke jurang
  if(p.y>H+100){
    p.hp-=25;p.inv=60;
    p.x=cam.x+W/2;p.y=100;p.vy=0;
    triggerShake(8,15);
  }
  
  // Koin
  platforms.forEach(pl=>{
    pl.coins.forEach(c=>{
      if(c.collected)return;
      if(Math.hypot(p.x-c.x,p.y-c.y)<25){
        c.collected=true;score+=50;sfxCoin();
        spawnP(c.x,c.y,6,'#FFD700',0.8,0.7);
      }
    });
  });
  
  // Regenerasi energi
  if(!p.onCloud)p.energy=Math.min(p.maxEnergy,p.energy+0.08);
  
  if(p.inv>0)p.inv--;
  if(p.atkCD>0)p.atkCD--;
}

/* ========== DRAW PLATFORM ========== */
function drawPlatform(pl){
  let sx=pl.x-cam.x,sy=pl.y-cam.y;
  if(sx+pl.w<-50||sx>W+50)return;
  
  X.save();
  
  if(pl.type==='ground'){
    // Tanah dengan rumput
    X.fillStyle='#8B6914';
    X.fillRect(sx,sy,pl.w,pl.h+200);
    // Rumput
    X.fillStyle='#4CAF50';
    X.fillRect(sx,sy,pl.w,6);
    X.fillStyle='#66BB6A';
    X.fillRect(sx,sy,pl.w,3);
    // Tekstur tanah
    X.fillStyle='rgba(0,0,0,0.1)';
    for(let i=0;i<pl.w;i+=30){
      X.fillRect(sx+i,sy+10,15,3);
      X.fillRect(sx+i+10,sy+25,12,3);
    }
  }else if(pl.type==='candy'){
    // Platform permen
    X.beginPath();X.roundRect(sx,sy,pl.w,pl.h,6);
    let cg=X.createLinearGradient(sx,sy,sx,sy+pl.h);
    cg.addColorStop(0,'#FF9ED8');cg.addColorStop(1,'#CC6699');
    X.fillStyle=cg;X.fill();
    X.strokeStyle='#FF69B4';X.lineWidth=1.5;X.stroke();
    // Garis putih
    for(let i=0;i<pl.w;i+=20){
      X.fillStyle='rgba(255,255,255,0.3)';
      X.fillRect(sx+i,sy,10,pl.h);
    }
  }else if(pl.type==='chocolate'){
    X.beginPath();X.roundRect(sx,sy,pl.w,pl.h,6);
    let chg=X.createLinearGradient(sx,sy,sx,sy+pl.h);
    chg.addColorStop(0,'#8B4513');chg.addColorStop(1,'#5C2E00');
    X.fillStyle=chg;X.fill();
    X.strokeStyle='#6B3410';X.lineWidth=1.5;X.stroke();
    // Pola coklat
    for(let i=10;i<pl.w;i+=25){
      X.fillStyle='rgba(139,90,43,0.4)';
      X.fillRect(sx+i,sy+2,12,pl.h-4);
    }
  }else if(pl.type==='ice'){
    X.beginPath();X.roundRect(sx,sy,pl.w,pl.h,6);
    let ig=X.createLinearGradient(sx,sy,sx,sy+pl.h);
    ig.addColorStop(0,'#B3E5FC');ig.addColorStop(1,'#4FC3F7');
    X.fillStyle=ig;X.fill();
    X.strokeStyle='#29B6F6';X.lineWidth=1.5;X.stroke();
    // Kilau es
    X.fillStyle='rgba(255,255,255,0.5)';
    X.fillRect(sx+5,sy+3,15,3);
    X.fillRect(sx+pl.w-25,sy+5,12,2);
  }
  
  // Dekorasi bunga
  if(pl.decor==='flower'&&pl.type!=='ground'){
    let fx=sx+pl.w*0.5,fy=sy-12;
    X.fillStyle='#228B22';X.fillRect(fx-1,fy,2,12);
    let cols=['#FF6B6B','#FFD700','#FF69B4','#9D6BFF'];
    let fc=pick(cols);
    for(let i=0;i<5;i++){
      let a=(i/5)*6.28+frame*0.01;
      X.beginPath();X.arc(fx+Math.cos(a)*5,fy+Math.sin(a)*5,3.5,0,6.28);X.fillStyle=fc;X.fill();
    }
    X.beginPath();X.arc(fx,fy,3,0,6.28);X.fillStyle='#FFD700';X.fill();
  }
  
  X.restore();
}

  // Matahari
  let sunX=W*0.85-cam.x*0.02,sunY=H*0.1;

    X.fill();X.globalAlpha=1;
  }
  
  // Bukit parallax
  X.fillStyle='#A8E6CF';
  for(let i=-1;i<4;i++){
    let hx=i*300-cam.x*0.1;

  X.fillStyle='#C1F0C1';
  for(let i=-1;i<5;i++){

    X.beginPath();X.ellipse(hx,H-40,200,60,0,Math.PI,0);X.fill();

/* ========== DRAW STAR HELPER ========== */
function drawStar(c,cx,cy,sp,or,ir,col){
  let rot=Math.PI/2*3,step=Math.PI/sp;
  c.beginPath();c.moveTo(cx,cy-or);
  for(let i=0;i<sp;i++){
    c.lineTo(cx+Math.cos(rot)*or,cy+Math.sin(rot)*or);rot+=step;
    c.lineTo(cx+Math.cos(rot)*ir,cy+Math.sin(rot)*ir);rot+=step;
  }
  c.closePath();c.fillStyle=col;c.fill();
}

/* ========== INISIALISASI ========== */
function initGame(){
  player=createPlayer();
  platforms=[];ghosts=[];coins=[];particles=[];projectiles=[];kameBlasts=[];
  score=0;distance=0;frame=0;quakeCD=500;cloudTimer=0;genX=0;
  shake={x:0,y:0,i:0,t:0};
  // Platform awal
  platforms.push(makePlat(-100,H-40,600,'ground'));
  genX=500;
  for(let i=0;i<3;i++)generateChunk(genX);
  cam.x=0;cam.y=0;
}

/* ========== GAME LOOP ========== */
function loop(){
  requestAnimationFrame(loop);
  if(state!=='play')return;
  frame++;
  
  // Update pemain
  updatePlayer();
  
  // Kamera mengikuti pemain
  let targetCX=player.x-W*0.35;
  cam.x+=(targetCX-cam.x)*0.08;
  
  // Jarak/skor
  distance=Math.max(distance,Math.floor(player.x/10));
  score=Math.max(score,distance);
  
  // Generate chunk baru
  if(player.x>genX-W*2)generateChunk(genX);
  
  // Hapus platform yang jauh di belakang
  platforms=platforms.filter(p=>p.x+p.w>cam.x-300);
  
  // Spawn hantu
  cloudTimer++;
  let spawnRate=Math.max(120,400-distance*0.3);
  if(cloudTimer>spawnRate){
    cloudTimer=0;
    spawnGhost();
  }
  
  // Update hantu
  ghosts.forEach(g=>updateGhost(g));
  ghosts=ghosts.filter(g=>{
    if(g.hp<=0){
      score+=200;spawnP(g.x,g.y,20,'#B040FF',1.5,1.2);
      sfxHit();triggerShake(5,10);return false;
    }
    // Hapus jika terlalu jauh
    return Math.abs(g.x-cam.x)<W+200;
  });
  
  // Update proyektil tongkat
  projectiles.forEach(p=>{
    p.x+=p.vx;p.life--;
    ghosts.forEach(g=>{
      if(Math.hypot(p.x-g.x,p.y-g.y)<p.size+g.size){
        g.hp-=1;g.hitFlash=6;p.life=0;spawnP(g.x,g.y,4,'#FFD700',0.8);
        sfxHit();
      }
    });
  });
  projectiles=projectiles.filter(p=>p.life>0);
  
  // Update kamehameha
  kameBlasts.forEach(k=>updateKame(k));
  kameBlasts=kameBlasts.filter(k=>k.life>0);
  
  // Update partikel
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.vx*=0.97;p.life--});
  particles=particles.filter(p=>p.life>0);
  
  // Gempa periodik
  quakeCD--;
  if(quakeCD<=0){triggerQuake();quakeCD=rndI(400,800)}
  if(shake.t>0){shake.t--;let d=shake.t/100;shake.x=(Math.random()-0.5)*shake.i*d*2;shake.y=(Math.random()-0.5)*shake.i*d*2}else{shake.x=0;shake.y=0}
  
  // Cek mati
  if(player.hp<=0){
    state='over';
    document.getElementById('goSt').innerHTML=`Skor: <span>${score}</span><br>Jarak: <span>${distance}m</span>`;
    document.getElementById('gameover').classList.add('show');
  }
  
  // ===== RENDER =====
  X.save();
  X.translate(shake.x,shake.y);
  
  drawSky();
  
  // Platform
  platforms.forEach(pl=>{
    drawPlatform(pl);
    pl.coins.forEach(c=>drawCoin(c,pl));
  });
  
  // Kamehameha blasts
  kameBlasts.forEach(k=>drawKame(k));
  
  // Proyektil
  projectiles.forEach(p=>drawProjectile(p));
  
  // Hantu
  ghosts.forEach(g=>drawGhost(g));
  
  // Pemain
  drawPlayer();
  
  // Partikel
  particles.forEach(p=>{
    let a=p.life/p.ml;
    X.globalAlpha=a;X.fillStyle=p.color;
    X.beginPath();X.arc(p.x-cam.x,p.y-cam.y,Math.max(0.5,p.size*a),0,6.28);X.fill();
    X.globalAlpha=1;
  });
  
  // Vignette
  let vg=X.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.7);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(15,0,25,0.35)');
  X.fillStyle=vg;X.fillRect(-30,-30,W+60,H+60);
  
  // Danger overlay
  if(player.hp<30){
    let dp=Math.sin(frame*0.12)*0.12+0.12;
    X.fillStyle=`rgba(255,0,0,${dp})`;X.fillRect(-30,-30,W+60,H+60);
  }
  
  X.restore();
  
  // UI
  document.getElementById('hpB').style.width=Math.max(0,player.hp/player.maxHp*100)+'%';
  document.getElementById('enB').style.width=Math.max(0,player.energy/player.maxEnergy*100)+'%';
  document.getElementById('scV').textContent=score;
  document.getElementById('dsV').textContent=distance+'m';
}

/* ========== EVENT ========== */
document.getElementById('startBtn').addEventListener('click',()=>{
  initAudio();initGame();state='play';
  document.getElementById('overlay').classList.add('hidden');
});
document.getElementById('restartBtn').addEventListener('click',()=>{
  initGame();state='play';
  document.getElementById('gameover').classList.remove('show');
});

// Polyfill roundRect
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);return this;
  }
}

loop();

// Menu animasi
setTimeout(()=>{
  function menuAnim(){
    if(state!=='menu')return;requestAnimationFrame(menuAnim);
    drawSky();
    let vg=X.createRadialGradient(W/2,H/2,W*0.15,W/2,H/2,W*0.6);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(10,0,15,0.75)');
    X.fillStyle=vg;X.fillRect(0,0,W,H);
  }
  menuAnim();
},50);
</script>
